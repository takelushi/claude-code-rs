name: Enforce branch policy

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    name: Source branch check
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR is from develop or release-please
        run: |
          HEAD="${{ github.head_ref }}"
          if [ "$HEAD" = "develop" ] || [[ "$HEAD" == release-please--* ]]; then
            echo "Allowed source branch: $HEAD"
          else
            echo "::error::PRs to main must come from develop or release-please. Got: $HEAD"
            exit 1
          fi
