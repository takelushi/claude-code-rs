name: Enforce branch policy

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    name: Source branch check
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR is from develop
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "::error::PRs to main must come from the develop branch. Got: ${{ github.head_ref }}"
            exit 1
          fi
